# Production docker-compose — pulls images from ECR instead of building locally.
#
# Recommended folder layout on your VPS:
#   /opt/lebventures/
#     docker-compose.prod.yml
#     .env.prod          ← ECR_REGISTRY
#     api.env            ← copy from api/.env.example and fill in
#     frontend.env       ← copy from frontend/.env.example and fill in
#     admin.env          ← copy from admin/.env.example and fill in
#
# Start the stack:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:

  api:
    image: ${ECR_REGISTRY}/lebventures-api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./api.env
    networks:
      - lebventures

  frontend:
    image: ${ECR_REGISTRY}/lebventures-frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # host nginx proxies to :8080 → container nginx on :80
    env_file:
      - ./frontend.env
    depends_on:
      - api
    networks:
      - lebventures

  admin:
    image: ${ECR_REGISTRY}/lebventures-admin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./admin.env
    depends_on:
      - api
    networks:
      - lebventures

networks:
  lebventures:
    driver: bridge
