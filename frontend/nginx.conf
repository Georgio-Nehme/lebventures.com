server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Event detail pages: serve the static shell for any /events/{id} not pre-built
    location ~ ^/events/[^/]+/?$ {
        try_files $uri $uri/index.html /events/_/index.html;
    }

    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
}
