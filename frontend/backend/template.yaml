AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: LebVentures backend — API Gateway + Lambda + DynamoDB + S3 + Cognito

# ─────────────────────────────────────────────────────────────────────────────
# Global defaults applied to every Lambda function
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTable
        IMAGES_BUCKET: !Ref ImagesBucket
        CORS_ORIGIN: !Ref CorsOrigin

# ─────────────────────────────────────────────────────────────────────────────
# Parameters (override at deploy time)
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  CorsOrigin:
    Type: String
    Default: 'https://lebventures.com'
    Description: Allowed CORS origin for the API

  AdminEmail:
    Type: String
    Description: E-mail for the initial Cognito admin user

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: lebventures-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # ── S3 — image / file storage ─────────────────────────────────────────────
  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'lebventures-images-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins:
              - !Ref CorsOrigin
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${ImagesBucket.Arn}/*'

  # ── Cognito ───────────────────────────────────────────────────────────────
  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: lebventures-admins
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref AdminUserPool
      ClientName: lebventures-admin-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ── API Gateway HTTP API ───────────────────────────────────────────────────
  LebVenturesApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}'
              audience:
                - !Ref AdminUserPoolClient
        DefaultAuthorizer: CognitoAuthorizer

  # ── Shared Lambda IAM role ────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt EventsTable.Arn
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource: !Sub '${ImagesBucket.Arn}/*'

  # ── Lambda functions ──────────────────────────────────────────────────────

  # Public — no auth required
  GetEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/events/
      Handler: getEvents.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /events
            Method: GET
            Auth:
              Authorizer: NONE

  GetEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/events/
      Handler: getEvent.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /events/{id}
            Method: GET
            Auth:
              Authorizer: NONE

  # Protected — Cognito JWT required
  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/events/
      Handler: createEvent.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /events
            Method: POST

  UpdateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/events/
      Handler: updateEvent.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /events/{id}
            Method: PUT

  DeleteEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/events/
      Handler: deleteEvent.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /events/{id}
            Method: DELETE

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/upload/
      Handler: getUploadUrl.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref LebVenturesApi
            Path: /upload-url
            Method: POST

# ─────────────────────────────────────────────────────────────────────────────
# Outputs — copy these values into your .env file
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${LebVenturesApi}.execute-api.${AWS::Region}.amazonaws.com'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref AdminUserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref AdminUserPoolClient

  ImagesBucketName:
    Description: S3 bucket for event images
    Value: !Ref ImagesBucket

  ImagesBucketUrl:
    Description: Public base URL for images
    Value: !Sub 'https://${ImagesBucket}.s3.${AWS::Region}.amazonaws.com'
